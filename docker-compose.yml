version: "3.8"

services:
  postgres-brazil:
    image: postgres:15-alpine
    container_name: postgres-brazil
    environment:
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: futurekawa123
      POSTGRES_DB: futurekawa_brazil
    ports:
      - "5432:5432"
    volumes:
      - postgres-brazil-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurekawa -d futurekawa_brazil"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto-brazil:
    image: eclipse-mosquitto:2
    container_name: mosquitto-brazil
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  brazil-service:
    build:
      context: ./backend-country/brazil-service
      dockerfile: Dockerfile
    container_name: brazil-service
    environment:
      DATABASE_URL: "postgresql://futurekawa:futurekawa123@postgres-brazil:5432/futurekawa_brazil"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres-brazil:
        condition: service_healthy

volumes:
  postgres-brazil-data:
  mosquitto-data:
  mosquitto-log: